    return new TextDecoder("utf-8").decode(bytes);
  }

  function isMobileDevice() {
    const ua = navigator.userAgent || navigator.vendor || window.opera || "";
    const uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
    const coarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    const narrowViewport = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
    return Boolean(uaMobile || (coarsePointer && narrowViewport));
  }

  const chosen = isMobileDevice() ? "mobile" : "desktop";
  const html = chosen === "mobile" ? decodeUtf8Base64(MOBILE_HTML_B64) : decodeUtf8Base64(DESKTOP_HTML_B64);

  console.info("[ACE responsive wrapper] layout escolhido:", chosen);
  console.info("[ACE responsive wrapper] desktop interno SHA-256:", DESKTOP_SHA256);
  console.info("[ACE responsive wrapper] mobile interno SHA-256:", MOBILE_SHA256);
  console.info("[ACE responsive wrapper] nenhum HTML interno foi reescrito; apenas selecionado.");

  document.open();
  document.write(html);
  document.close();
})();
</script>
