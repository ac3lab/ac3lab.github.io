<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE Laboratory – Match Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:#0a0f14;color:#e8edf2;min-height:100vh}
:root{--field:#237a35;--panel:#111820;--ace:#00e5a0;--bench-bg:rgba(255,255,255,.05)}
#app{max-width:1380px;margin:0 auto;padding:12px;display:flex;gap:14px}
#left-col{flex:1;min-width:0}
#right-col{width:380px;flex-shrink:0}

/* ── Header ── */
.match-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:10px}
.team-label{font-size:18px;font-weight:700;letter-spacing:.5px}
.score-box{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:#fff;padding:4px 20px;background:rgba(0,0,0,.4);border-radius:8px;letter-spacing:4px}
.formation-label{font-size:12px;color:rgba(255,255,255,.5);text-align:center}

/* ── Banco ── */
.bench-strip{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--bench-bg);border-radius:8px;margin:4px 0;min-height:52px;align-items:center}
.bench-title{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;width:100%}
.bench-token{display:inline-flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:2px 4px;border-radius:6px;transition:background .15s}
.bench-token:hover{background:rgba(255,255,255,.1)}
.bench-token.selected-bench{background:rgba(255,228,0,.15);outline:2px solid #ffd700}
.bench-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.3)}
.bench-name{font-size:8.5px;color:rgba(255,255,255,.65);max-width:52px;text-align:center;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bench-ace{font-size:7.5px;font-weight:700;color:var(--ace)}
.bench-token.no-data .bench-avatar{opacity:.4}
.bench-token.no-data .bench-ace{color:rgba(255,255,255,.3)}

/* ── Campo ── */
.field-wrap{position:relative;background:var(--field);border-radius:10px;overflow:hidden;width:100%}
.field-wrap::before{content:'';display:block;padding-bottom:105.9%}
.field-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.players-layer{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── Tokens de jogador ── */
.player-token{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:grab;z-index:2;transition:transform .15s}
.player-token:hover{transform:translate(-50%,-50%) scale(1.12)}
.player-token.dragging{opacity:.5;cursor:grabbing;z-index:99}
.player-token.drag-over .p-avatar{border-color:#00e5a0;box-shadow:0 0 0 4px rgba(0,229,160,.5)}
.p-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:2.5px solid rgba(255,255,255,.5);transition:box-shadow .15s,border-color .15s}
.player-token.selected .p-avatar{border-color:#ffd700;box-shadow:0 0 0 3px rgba(255,215,0,.4)}
.player-token.selected-bench-target .p-avatar{border-color:#00e5a0;box-shadow:0 0 0 3px rgba(0,229,160,.4)}
.p-name{font-size:8.5px;font-weight:600;color:#fff;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px;max-width:66px;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-ace{font-size:7.5px;font-weight:700;color:var(--ace);background:rgba(0,0,0,.6);padding:1px 4px;border-radius:2px}
.line-label{position:absolute;font-size:9px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.5px;pointer-events:none}
.swap-mode-banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#ffd700;background:rgba(0,0,0,.7);padding:3px 12px;border-radius:10px;z-index:10;pointer-events:none}

/* ── Painel de stats ── */
#stats-panel{background:var(--panel);border-radius:12px;padding:0;height:fit-content;position:sticky;top:10px;border:1px solid rgba(255,255,255,.08);overflow:hidden}
.stats-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:rgba(255,255,255,.25);text-align:center;gap:8px;font-size:13px}
.sp-header{padding:16px 18px 12px}
.sp-team-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.sp-name{font-size:20px;font-weight:700;line-height:1.1;margin-bottom:2px}
.sp-meta{font-size:12px;color:rgba(255,255,255,.45)}
.sp-ace-block{background:rgba(0,229,160,.08);border-top:1px solid rgba(0,229,160,.2);border-bottom:1px solid rgba(0,229,160,.15);padding:14px 18px;text-align:center}
.sp-ace-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--ace);text-transform:uppercase;margin-bottom:4px}
.sp-ace-val{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;color:var(--ace);line-height:1}
.sp-ace-sub{font-size:11px;color:rgba(0,229,160,.6);margin-top:2px}
.sp-ratings{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.sp-rat{background:var(--panel);padding:10px 12px;text-align:center}
.sp-rat-lbl{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sp-rat-val{font-size:16px;font-weight:700;color:#fff}
.sp-rat-val.good{color:#00e5a0}.sp-rat-val.mid{color:#ffc400}.sp-rat-val.low{color:#ff6b6b}
.sp-stats{padding:12px 16px;display:flex;flex-direction:column;gap:10px;max-height:440px;overflow-y:auto}
.sp-stats::-webkit-scrollbar{width:4px}
.sp-stats::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sp-sec-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.08)}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.sp-stat{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(255,255,255,.04);border-radius:4px}
.sp-stat-lbl{font-size:11px;color:rgba(255,255,255,.5)}
.sp-stat-val{font-size:12px;font-weight:700;color:#fff}
.minutes-bar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px}
.minutes-fill{height:100%;border-radius:2px;background:var(--ace)}
.sp-evo{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sp-evo-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
#evo-canvas{width:100%;height:80px}

/* ── Tabs do painel direito ── */
.panel-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.1)}
.panel-tab{flex:1;padding:10px 6px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;letter-spacing:.5px;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;transition:all .2s}
.panel-tab.active{color:var(--ace);border-bottom-color:var(--ace)}
.panel-tab:hover{color:rgba(255,255,255,.7)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── MVP ── */
.mvp-block{padding:20px 18px;text-align:center;background:linear-gradient(135deg,rgba(0,229,160,.08),rgba(255,196,0,.06));border-bottom:1px solid rgba(255,196,0,.15)}
.mvp-crown{font-size:28px;margin-bottom:6px}
.mvp-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#ffd700;text-transform:uppercase;margin-bottom:8px}
.mvp-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.mvp-score{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#ffd700;line-height:1}
.mvp-team{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:10px}
.mvp-motivo{font-size:11px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.05);border-radius:6px;padding:8px 12px;line-height:1.5}

/* ── Ranking ── */
.ranking-list{padding:12px 16px;display:flex;flex-direction:column;gap:6px;max-height:480px;overflow-y:auto}
.ranking-list::-webkit-scrollbar{width:4px}
.ranking-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.rank-item:hover{background:rgba(255,255,255,.07)}
.rank-item.rank-1{background:rgba(255,196,0,.12)}
.rank-item.rank-2{background:rgba(192,192,192,.08)}
.rank-item.rank-3{background:rgba(205,127,50,.08)}
.rank-num{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;width:24px;text-align:center;flex-shrink:0}
.rank-1 .rank-num{color:#ffd700}
.rank-2 .rank-num{color:#c0c0c0}
.rank-3 .rank-num{color:#cd7f32}
.rank-num-normal{color:rgba(255,255,255,.35)}
.rank-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-team{font-size:10px;color:rgba(255,255,255,.4)}
.rank-ace{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;flex-shrink:0}

/* ── Comparador ── */
.compare-section{padding:14px 16px}
.compare-selects{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.compare-selects select{background:#1a2430;color:#e8edf2;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 8px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;width:100%}
.compare-table{width:100%;border-collapse:collapse;font-size:11px}
.compare-table th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);padding:6px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
.compare-table th:first-child{text-align:left}
.compare-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.compare-table td:first-child{color:rgba(255,255,255,.5);font-size:10px}
.compare-table td:not(:first-child){text-align:center;font-weight:700;font-size:12px}
.compare-table tr td.winner{color:#00e5a0}
.compare-table tr:hover td{background:rgba(255,255,255,.03)}

/* ── Radar Chart ── */
.radar-wrap{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.radar-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
.radar-canvas-wrap{display:flex;justify-content:center}
.radar-compare-wrap{padding:10px 16px;border-top:1px solid rgba(255,255,255,.06)}
.radar-compare-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
.radar-legend{display:flex;gap:14px;justify-content:center;margin-top:6px;font-size:10px}
.radar-legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* ── Rede de Passes ── */
.pass-net-toggle{position:absolute;bottom:10px;left:10px;z-index:20;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:6px 14px;cursor:pointer;user-select:none;transition:border-color .2s}
.pass-net-toggle:hover{border-color:rgba(0,229,160,.5)}
.pass-net-toggle input[type=checkbox]{display:none}
.toggle-pill{width:30px;height:16px;border-radius:8px;background:rgba(255,255,255,.2);position:relative;transition:background .2s;flex-shrink:0}
.toggle-pill::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s}
.pass-net-toggle.active .toggle-pill{background:var(--ace)}
.pass-net-toggle.active .toggle-pill::after{transform:translateX(14px)}
.toggle-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.7)}
.pass-net-toggle.active .toggle-label{color:var(--ace)}
#pass-net-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;display:none}
#pass-net-svg.visible{display:block;pointer-events:all}
/* Tooltip da rede */
#pass-tooltip{position:fixed;background:rgba(10,15,20,.95);border:1px solid rgba(0,229,160,.4);border-radius:8px;padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:12px;color:#e8edf2;pointer-events:none;z-index:999;display:none;min-width:170px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#pass-tooltip .pt-pair{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
#pass-tooltip .pt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.07)}
#pass-tooltip .pt-row:last-child{border-bottom:none}
#pass-tooltip .pt-lbl{color:rgba(255,255,255,.5);font-size:11px}
#pass-tooltip .pt-val{font-weight:700;color:var(--ace);font-size:13px}
.tactic-section{padding:14px 16px}
.tactic-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px}
.formation-buttons{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.formation-btn{padding:8px 6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#e8edf2;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.formation-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25)}
.formation-btn.active-formation{background:rgba(0,229,160,.15);border-color:var(--ace);color:var(--ace)}
.tactic-team-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.4);text-transform:uppercase;margin:10px 0 6px}
</style>
</head>
<body>
<div id="app">
  <div id="left-col">
    <div class="match-header">
      <div>
        <div class="team-label" id="label-casa" style="color:#4caf78"></div>
        <div class="formation-label" id="formacao-casa"></div>
      </div>
      <div style="text-align:center">
        <div class="score-box" id="placar-box"></div>
      </div>
      <div style="text-align:right">
        <div class="team-label" id="label-fora" style="color:#f5c842"></div>
        <div class="formation-label" id="formacao-fora"></div>
      </div>
    </div>

    <div class="bench-strip" id="bench-fora">
      <div class="bench-title" id="bench-fora-title"></div>
    </div>

    <div class="field-wrap" id="field-wrap">
      <svg class="field-svg" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
        <!-- Borda externa -->
        <rect x="10" y="10" width="660" height="700" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <!-- Linha do meio -->
        <line x1="10" y1="360" x2="670" y2="360" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <!-- Círculo central -->
        <circle cx="340" cy="360" r="65" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <circle cx="340" cy="360" r="3" fill="rgba(255,255,255,.5)" stroke="none"/>

        <!-- Grande área TOPO — altura 100px (y=10..110) -->
        <rect x="150" y="10" width="380" height="100" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <!-- Pequena área TOPO — altura 38px (y=10..48) -->
        <rect x="240" y="10" width="200" height="38" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <!-- Pênalti TOPO -->
        <circle cx="340" cy="80" r="3" fill="rgba(255,255,255,.5)" stroke="none"/>
        <!-- Arco grande área TOPO: semicírculo perfeito r=60 centrado no pênalti (340,80), apenas parte abaixo de y=110 -->
        <path d="M150,110 A60,60 0 0,0 530,110" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>

        <!-- Grande área BASE — altura 100px (y=610..710) -->
        <rect x="150" y="610" width="380" height="100" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <!-- Pequena área BASE — altura 38px (y=672..710) -->
        <rect x="240" y="672" width="200" height="38" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>
        <!-- Pênalti BASE -->
        <circle cx="340" cy="640" r="3" fill="rgba(255,255,255,.5)" stroke="none"/>
        <!-- Arco grande área BASE: semicírculo perfeito r=60 centrado no pênalti (340,640), apenas parte acima de y=610 -->
        <path d="M150,610 A60,60 0 0,1 530,610" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.5"/>

        <!-- Gol TOPO -->
        <line x1="295" y1="10" x2="385" y2="10" stroke="rgba(255,255,255,.65)" stroke-width="3.5"/>
        <!-- Gol BASE -->
        <line x1="295" y1="710" x2="385" y2="710" stroke="rgba(255,255,255,.65)" stroke-width="3.5"/>

        <!-- Faixas de sombreamento -->
        <rect x="10" y="10" width="660" height="165" fill="rgba(0,0,0,.10)"/>
        <rect x="10" y="545" width="660" height="165" fill="rgba(0,0,0,.10)"/>

        <!-- Labels dos times -->
        <text x="24" y="30" fill="rgba(255,255,255,.18)" font-size="10" font-family="Rajdhani" id="svg-label-fora"></text>
        <text x="24" y="706" fill="rgba(255,255,255,.18)" font-size="10" font-family="Rajdhani" id="svg-label-casa"></text>
      </svg>
      <div class="players-layer" id="players-layer">
        <div class="swap-mode-banner" id="swap-banner" style="display:none">Selecionar alvo de troca</div>
      </div>
      <!-- Rede de passes (SVG sobreposto ao campo) -->
      <svg id="pass-net-svg" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
      <!-- Toggle rede de passes -->
      <div class="pass-net-toggle" id="pass-net-toggle" onclick="togglePassNet()">
        <div class="toggle-pill"></div>
        <span class="toggle-label">⬡ Rede de Passes</span>
      </div>
    </div>
    <!-- Tooltip global da rede -->
    <div id="pass-tooltip"></div>

    <div class="bench-strip" id="bench-casa">
      <div class="bench-title" id="bench-casa-title"></div>
    </div>
  </div>

  <div id="right-col">
    <!-- Tabs -->
    <div style="background:var(--panel);border-radius:12px;border:1px solid rgba(255,255,255,.08);overflow:hidden;margin-bottom:10px">
      <div class="panel-tabs">
        <div class="panel-tab active" onclick="switchTab('mvp')">🏆 MVP</div>
        <div class="panel-tab" onclick="switchTab('ranking')">📊 Ranking</div>
        <div class="panel-tab" onclick="switchTab('compare')">⚔️ Comparar</div>
        <div class="panel-tab" onclick="switchTab('tactic')">🔧 Tático</div>
      </div>
      <div id="tab-mvp" class="tab-content active"></div>
      <div id="tab-ranking" class="tab-content"></div>
      <div id="tab-compare" class="tab-content">
        <div class="compare-section">
          <div class="compare-selects">
            <select id="cmp-a" onchange="renderCompare()"><option value="">Jogador A</option></select>
            <select id="cmp-b" onchange="renderCompare()"><option value="">Jogador B</option></select>
          </div>
          <div id="compare-result"></div>
        </div>
      </div>
      <div id="tab-tactic" class="tab-content">
        <div class="tactic-section">
          <div class="tactic-title" id="tactic-title-casa"></div>
          <div class="formation-buttons" id="formation-btns-casa"></div>
          <div class="tactic-title" id="tactic-title-fora"></div>
          <div class="formation-buttons" id="formation-btns-fora"></div>
        </div>
      </div>
    </div>

    <!-- Stats panel -->
    <div id="stats-panel">
      <div class="stats-empty">
        <div style="font-size:32px;color:rgba(255,255,255,.15)">⬡</div>
        <div>Clique em qualquer jogador</div>
        <div style="font-size:11px">para ver as estatísticas</div>
      </div>
    </div>
  </div>
</div>

// ── Helpers ─────────────────────────────────────────────────────────────────
function initials(name){
  if(!name) return '?';
  const p = name.split(' ');
  return (p[0][0] + (p[p.length-1][0] || '')).toUpperCase();
}
function shortName(name){
  if(!name) return '';
  const p = name.split(' ');
  return p.length > 2 ? p[0]+' '+p[p.length-1] : name;
}
function aceScore(pct){ return pct == null ? null : (pct*5)+5; }
function aceColor(a){
  if(a == null) return '#888';
  if(a >= 8)   return '#00e5a0';
  if(a >= 7)   return '#ffc400';
  return '#ff8c69';
}
function ratClass(v, hi, mid){
  if(v == null) return '';
  return v >= hi ? 'good' : v >= mid ? 'mid' : 'low';
}
function fmtVal(v){
  if(v == null || v === '' || (typeof v === 'number' && isNaN(v))) return '—';
  const n = +v;
  return isNaN(n) ? v : (n % 1 === 0 ? n : n.toFixed(1));
}

function allPlayers(){
  return RAW_DATA;
}
function playerByName(name){
  return RAW_DATA.find(p => p.Jogador === name);
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.panel-tab').forEach((t,i) => {
    const ids = ['mvp','ranking','compare','tactic'];
    t.classList.toggle('active', ids[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function init(){
  document.getElementById('label-casa').textContent = MATCH_INFO.time_casa;
  document.getElementById('label-fora').textContent = MATCH_INFO.time_fora;
  document.getElementById('placar-box').textContent =
    MATCH_INFO.placar_casa + ' × ' + MATCH_INFO.placar_fora;
  document.getElementById('svg-label-fora').textContent = MATCH_INFO.time_fora.toUpperCase();
  document.getElementById('svg-label-casa').textContent = MATCH_INFO.time_casa.toUpperCase();
  document.getElementById('bench-fora-title').textContent = MATCH_INFO.time_fora + ' — banco';
  document.getElementById('bench-casa-title').textContent = MATCH_INFO.time_casa + ' — banco';

  buildFormations();
  renderBench();
  renderField();
  renderMVP();
  renderRanking();
  populateCompareSelects();
  renderTacticPanel();
}

function buildFormations(){
  RAW_DATA.forEach(p => {
    const line = POS_TO_LINE[p.Posicao] || 'BENCH';
    if(p.Status === 'Titular' && line !== 'BENCH'){
      formations[p.Equipa][line].push(p);
    } else {
      bench[p.Equipa].push(p);
    }
  });
  ['DEF','MID','FWD'].forEach(l => {
    [MATCH_INFO.time_casa, MATCH_INFO.time_fora].forEach(t => {
      if(formations[t] && formations[t][l])
        formations[t][l].sort((a,b)=>(a['Posicao Media Y']||0)-(b['Posicao Media Y']||0));
    });
  });
  updateFormationLabels();
}

function updateFormationLabels(){
  [
    [MATCH_INFO.time_casa, 'formacao-casa'],
    [MATCH_INFO.time_fora, 'formacao-fora'],
  ].forEach(([t, id]) => {
    const f = formations[t];
    if(!f) return;
    document.getElementById(id).textContent =
      [f.DEF.length, f.MID.length, f.FWD.length].join('-');
  });
}

// ── MVP ──────────────────────────────────────────────────────────────────────
function gerarMotivo(p, ace){
  const bits = [];
  if(p.Golos > 0) bits.push(`${p.Golos} gol${p.Golos>1?'s':''}`);
  if(p.Assistencias > 0) bits.push(`${p.Assistencias} assist.`);
  if(p['Passes Certos'] > 50) bits.push(`${p['Passes Certos']} passes certos`);
  if(p['Recuperacoes de Bola'] > 8) bits.push(`${p['Recuperacoes de Bola']} recuperações`);
  if(p['Desarmes Feitos'] > 5) bits.push(`${p['Desarmes Feitos']} desarmes`);
  if(p['Interceptacoes'] > 4) bits.push(`${p['Interceptacoes']} interceptações`);
  if(p['Defesas (GR)'] > 3) bits.push(`${p['Defesas (GR)']} defesas`);
  if(bits.length === 0) bits.push('desempenho sólido em múltiplas métricas');
  return 'Destaque pela equipa: ' + bits.join(', ') + '.';
}

function renderMVP(){
  const ranked = RAW_DATA
    .filter(p => p.nota_percentil != null)
    .map(p => ({p, ace: aceScore(p.nota_percentil)}))
    .sort((a,b) => b.ace - a.ace);

  const el = document.getElementById('tab-mvp');
  if(!ranked.length){ el.innerHTML = '<div class="stats-empty">Sem dados ACE disponíveis</div>'; return; }

  const {p, ace} = ranked[0];
  const tc = TEAM_COLORS[p.Equipa] || {main:'#444', accent:'#888'};
  el.innerHTML = `
  <div class="mvp-block">
    <div class="mvp-crown">🏆</div>
    <div class="mvp-label">MVP da Partida</div>
    <div class="mvp-name">${p.Jogador}</div>
    <div class="mvp-team" style="color:${tc.accent}">${p.Equipa} · ${p.Posicao||'—'}</div>
    <div class="mvp-score" style="color:${aceColor(ace)}">${ace.toFixed(2)}</div>
    <div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:8px">ACE Score</div>
    <div class="mvp-motivo">${gerarMotivo(p, ace)}</div>
  </div>`;
}

// ── Ranking ──────────────────────────────────────────────────────────────────
function renderRanking(){
  const ranked = RAW_DATA
    .filter(p => p.nota_percentil != null)
    .map(p => ({p, ace: aceScore(p.nota_percentil)}))
    .sort((a,b) => b.ace - a.ace);

  const el = document.getElementById('tab-ranking');
  if(!ranked.length){ el.innerHTML = '<div class="stats-empty">Sem dados ACE</div>'; return; }

  let html = '<div class="ranking-list">';
  ranked.forEach(({p, ace}, i) => {
    const rank = i+1;
    const tc = TEAM_COLORS[p.Equipa] || {main:'#444',accent:'#888'};
    const medals = {1:'🥇',2:'🥈',3:'🥉'};
    const numStr = rank <= 3 ? medals[rank] : `<span class="rank-num-normal">${rank}</span>`;
    html += `
    <div class="rank-item rank-${rank}" onclick="showStatsFromRank('${p.Jogador.replace(/'/g,"\\'")}')">
      <div class="rank-num">${numStr}</div>
      <div class="rank-avatar" style="background:${tc.main};border:2px solid ${tc.accent}">${initials(p.Jogador)}</div>
      <div class="rank-info">
        <div class="rank-name">${shortName(p.Jogador)}</div>
        <div class="rank-team">${p.Equipa}</div>
      </div>
      <div class="rank-ace" style="color:${aceColor(ace)}">${ace.toFixed(2)}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;

function populateCompareSelects(){
  const players = RAW_DATA.filter(p => p.nota_percentil != null)

  ['ACE Score',      p => aceScore(p.nota_percentil), true],

function renderCompare(){
  const nameA = document.getElementById('cmp-a').value;
  const nameB = document.getElementById('cmp-b').value;
  const div   = document.getElementById('compare-result');
  if(!nameA || !nameB){ div.innerHTML = ''; return; }
  const pA = playerByName(nameA);
  const pB = playerByName(nameB);
  if(!pA || !pB){ div.innerHTML = ''; return; }
  const tcA = TEAM_COLORS[pA.Equipa]||{main:'#444',accent:'#888'};
  const tcB = TEAM_COLORS[pB.Equipa]||{main:'#444',accent:'#888'};

  let rows = '';
  COMPARE_METRICS.forEach(([label, fn, higherBetter]) => {
    const vA = fn(pA);
    const vB = fn(pB);
    const nA = vA == null ? null : +vA;
    const nB = vB == null ? null : +vB;
    let clA = '', clB = '';
    if(nA != null && nB != null && nA !== nB){
      const aWins = higherBetter ? nA > nB : nA < nB;
      clA = aWins ? 'winner' : '';
      clB = aWins ? '' : 'winner';
    }
    rows += `<tr>
      <td>${label}</td>
      <td class="${clA}">${fmtVal(vA)}</td>
      <td class="${clB}">${fmtVal(vB)}</td>
    </tr>`;
  });

  div.innerHTML = `
  <div class="radar-compare-wrap">
    <div class="radar-compare-title">Radar Comparativo</div>
    <div class="radar-canvas-wrap">
      <canvas id="radar-cmp-canvas" width="280" height="280"></canvas>
    </div>
    <div class="radar-legend">
      <span><span class="radar-legend-dot" style="background:${tcA.accent}"></span>${shortName(nameA)}</span>
      <span><span class="radar-legend-dot" style="background:${tcB.accent}"></span>${shortName(nameB)}</span>
    </div>
  </div>
  <table class="compare-table">
    <thead><tr>
      <th>Métrica</th>
      <th style="color:${tcA.accent}">${shortName(nameA)}</th>
      <th style="color:${tcB.accent}">${shortName(nameB)}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  requestAnimationFrame(() => drawRadar('radar-cmp-canvas', pA, pB, tcA.accent, tcB.accent));
}

function renderTacticPanel(){
  [MATCH_INFO.time_casa, MATCH_INFO.time_fora].forEach(team => {
    const suffix = team === MATCH_INFO.time_casa ? 'casa' : 'fora';
    const tc = TEAM_COLORS[team] || {main:'#444',accent:'#888'};
    document.getElementById('tactic-title-'+suffix).textContent = team + ' — Formação';
    const btns = document.getElementById('formation-btns-'+suffix);
    btns.innerHTML = '';
    Object.keys(FORMATION_DEFS).forEach(fname => {
      const btn = document.createElement('button');
      btn.className = 'formation-btn' + (activeFormations[team] === fname ? ' active-formation':'');
      btn.textContent = fname;
      btn.style.borderColor = tc.accent + '44';
      btn.onclick = () => applyFormation(team, fname);
      btns.appendChild(btn);
    });
  });
}

function applyFormation(team, fname){
  const def = FORMATION_DEFS[fname];
  if(!def) return;

  // Junta todos os jogadores de campo (exceto GK) com o banco do time
  const allField = [...formations[team].DEF, ...formations[team].MID, ...formations[team].FWD];
  const allBench = [...bench[team]];
  const pool = [...allField, ...allBench];

  // Separa GK
  const gk = formations[team].GK.slice();

  // Jogadores sem GK ordenados por ACE decrescente para preencher linhas
  const nonGK = pool.filter(p => (POS_TO_LINE[p.Posicao]||'BENCH') !== 'GK')
    .sort((a,b) => (aceScore(b.nota_percentil)||0) - (aceScore(a.nota_percentil)||0));

  const newDEF = nonGK.splice(0, def.DEF);
  const newMID = nonGK.splice(0, def.MID);
  const newFWD = nonGK.splice(0, def.FWD);
  const newBench = nonGK;  // restantes vão pro banco

  formations[team].GK  = gk;
  formations[team].DEF = newDEF;
  formations[team].MID = newMID;
  formations[team].FWD = newFWD;
  bench[team] = newBench;

  activeFormations[team] = fname;
  updateFormationLabels();
  renderTacticPanel();
  renderBench();
  renderField();
}

// ── Banco ───────────────────────────────────────────────────────────────────
function renderBench(){
  [
    [MATCH_INFO.time_casa, 'bench-casa'],
    [MATCH_INFO.time_fora, 'bench-fora'],
  ].forEach(([t, elId]) => {
    const el    = document.getElementById(elId);
    const title = el.querySelector('.bench-title');
    el.innerHTML = '';
    el.appendChild(title);
    (bench[t] || []).forEach((p,i) => {
      const ace    = aceScore(p.nota_percentil);
      const hasData = p.nota_percentil != null;
      const tc     = TEAM_COLORS[t] || {main:'#444', accent:'#888'};
      const div    = document.createElement('div');
      div.className = 'bench-token' + (hasData ? '' : ' no-data');
      div.dataset.name = p.Jogador;
      div.dataset.team = p.Equipa;
      div.draggable = true;
      div.innerHTML = `
        <div class="bench-avatar" style="background:${tc.main};border-color:${tc.accent}">
          ${initials(p.Jogador)}</div>
        <div class="bench-name">${shortName(p.Jogador)}</div>
        <div class="bench-ace">${ace != null ? ace.toFixed(2) : '—'}</div>`;
      div.onclick = () => onBenchClick(p, div);

      // Drag from bench
      div.addEventListener('dragstart', e => {
        dragSource = {type:'bench', team:t, idx:i, player:p};
        e.dataTransfer.effectAllowed = 'move';
      });
      div.addEventListener('dragend', () => { dragSource = null; });
      el.appendChild(div);
    });
  });
}

// ── Campo ───────────────────────────────────────────────────────────────────
function renderField(){
  const layer = document.getElementById('players-layer');
  layer.querySelectorAll('.player-token,.line-label').forEach(e => e.remove());

  [MATCH_INFO.time_fora, MATCH_INFO.time_casa].forEach(team => {
    const isTop  = (team === MATCH_INFO.time_fora);
    const LINE_Y = isTop ? LINE_Y_FORA : LINE_Y_CASA;
    const tc     = TEAM_COLORS[team] || {main:'#444', accent:'#888'};

    ['GK','DEF','MID','FWD'].forEach(line => {
      const players    = (formations[team] || {})[line] || [];
      if(!players.length) return;
      const yPos       = LINE_Y[line];
      const xPositions = LINE_X[Math.min(players.length, 5)] || LINE_X[4];

      const lbl = document.createElement('div');
      lbl.className = 'line-label';
      lbl.style.cssText = `top:${yPos};left:2px;transform:translateY(-50%)`;
      lbl.textContent = line;
      layer.appendChild(lbl);

      players.forEach((p, i) => {
        const xPos      = xPositions[i] || '50%';
        const ace       = aceScore(p.nota_percentil);
        const isSelected     = selectedField && selectedField.name === p.Jogador;
        const isBenchTarget  = selectedBench && selectedBench.team === team;

        const div = document.createElement('div');
        div.className = 'player-token'
          + (isSelected    ? ' selected'            : '')
          + (isBenchTarget ? ' selected-bench-target' : '');
        div.style.cssText = `left:${xPos};top:${yPos}`;
        div.dataset.name  = p.Jogador;
        div.dataset.team  = team;
        div.dataset.line  = line;
        div.dataset.idx   = i;
        div.draggable     = true;

        div.innerHTML = `
          <div class="p-avatar" style="background:${tc.main};border-color:${tc.accent}">
            ${initials(p.Jogador)}</div>
          <div class="p-name">${shortName(p.Jogador)}</div>
          <div class="p-ace">${ace != null ? ace.toFixed(2) : '—'}</div>`;

        div.addEventListener('click', () => onFieldClick(p, team, line, i));

        // Drag & Drop
        div.addEventListener('dragstart', e => {
          dragSource = {type:'field', team, line, idx:i, player:p};
          div.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        div.addEventListener('dragend', () => {
          div.classList.remove('dragging');
          dragSource = null;
          layer.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        });
        div.addEventListener('dragover', e => {
          e.preventDefault();
          if(dragSource && dragSource.player.Jogador !== p.Jogador)
            div.classList.add('drag-over');
        });
        div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
        div.addEventListener('drop', e => {
          e.preventDefault();
          div.classList.remove('drag-over');
          if(!dragSource) return;
          const src = dragSource;

          if(src.type === 'field'){
            // Troca dois jogadores de campo (mesmo time ou diferente — só swapa posições)
            const srcArr = formations[src.team][src.line];
            const dstArr = formations[team][line];
            const srcP   = srcArr[src.idx];
            const dstP   = dstArr[i];
            if(src.team === team && src.line === line){
              [srcArr[src.idx], dstArr[i]] = [dstArr[i], srcArr[src.idx]];
            } else {
              srcArr[src.idx] = dstP;
              dstArr[i]       = srcP;
            }
          } else if(src.type === 'bench'){
            // Substitui jogador em campo pelo do banco
            const benchArr = bench[src.team];
            const fieldArr = formations[team][line];
            const temp     = fieldArr[i];
            fieldArr[i]    = benchArr[src.idx];
            benchArr[src.idx] = temp;
          }

          dragSource = null;
          renderBench();
          renderField();
        });

        layer.appendChild(div);
      });
    });
  });

  // Atualiza rede de passes se estiver ativa
  refreshPassNet();

  // Bench tokens também recebem drop (para devolver jogador)
  document.querySelectorAll('.bench-token').forEach((el, _) => {
    el.addEventListener('dragover', e => { e.preventDefault(); el.style.outline='2px solid #00e5a0'; });
    el.addEventListener('dragleave', () => el.style.outline = '');
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.style.outline = '';
      if(!dragSource || dragSource.type !== 'field') return;
      const src = dragSource;
      const dstName = el.dataset.name;
      const dstTeam = el.dataset.team;
      if(src.team !== dstTeam){ dragSource=null; return; }
      const bi = bench[dstTeam].findIndex(p => p.Jogador === dstName);
      if(bi === -1){ dragSource=null; return; }
      const temp = bench[dstTeam][bi];
      bench[dstTeam][bi] = formations[src.team][src.line][src.idx];
      formations[src.team][src.line][src.idx] = temp;
      dragSource = null;
      renderBench();
      renderField();
    });
  });
}

// ── Interações por clique ─────────────────────────────────────────────────────
function onBenchClick(player, el){
  document.querySelectorAll('.bench-token').forEach(e => e.classList.remove('selected-bench'));
  if(selectedBench && selectedBench.name === player.Jogador){
    selectedBench = null;
    document.getElementById('swap-banner').style.display = 'none';
    return;
  }
  selectedBench = {name:player.Jogador, team:player.Equipa, player};
  selectedField = null;
  el.classList.add('selected-bench');
  document.getElementById('swap-banner').style.display = 'block';
  showStats(player);
  renderField();
}

function onFieldClick(player, team, line, idx){
  if(selectedBench){
    if(selectedBench.team === team){
      doSubstitution(selectedBench.player, player, team, line, idx);
      return;
    }
  }
  if(selectedField && selectedField.team === team && selectedField.line === line){
    if(selectedField.name === player.Jogador){
      selectedField = null;
    } else {
      const arr = formations[team][line];
      [arr[selectedField.idx], arr[idx]] = [arr[idx], arr[selectedField.idx]];
      selectedField = null;
    }
    renderField();
    return;
  }
  selectedField = {name:player.Jogador, team, line, idx};
  selectedBench = null;
  document.querySelectorAll('.bench-token').forEach(e => e.classList.remove('selected-bench'));
  document.getElementById('swap-banner').style.display = 'none';
  showStats(player);
  renderField();
}

function doSubstitution(benchPlayer, fieldPlayer, team, line, idx){
  formations[team][line][idx] = benchPlayer;
  const bi = bench[team].findIndex(p => p.Jogador === benchPlayer.Jogador);
  bench[team][bi] = fieldPlayer;
  selectedBench = null;
  selectedField = null;
  document.querySelectorAll('.bench-token').forEach(e => e.classList.remove('selected-bench'));
  document.getElementById('swap-banner').style.display = 'none';
  renderBench();
  renderField();
}

function drawEvo(points){
  const canvas = document.getElementById('evo-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const valid = points.filter(pt => pt.em_campo && pt.percentil_acum != null && pt.min > 0);
  if(valid.length < 2) return;

  const maxMin = Math.max(...valid.map(pt => pt.min), 1);
  const toX = m  => Math.round((m / maxMin) * (W-20)) + 10;
  const toY = v  => Math.round(H - 4 - v * (H-8));

  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth = 1;
  [0, 0.5, 1].forEach(v => {
    ctx.beginPath(); ctx.moveTo(0, toY(v)); ctx.lineTo(W, toY(v)); ctx.stroke();
  });

  ctx.beginPath();
  ctx.moveTo(toX(valid[0].min), toY(valid[0].percentil_acum));
  valid.slice(1).forEach(pt => ctx.lineTo(toX(pt.min), toY(pt.percentil_acum)));
  ctx.lineTo(toX(valid[valid.length-1].min), H);
  ctx.lineTo(toX(valid[0].min), H);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(0,229,160,.3)');
  grad.addColorStop(1, 'rgba(0,229,160,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.strokeStyle = '#00e5a0'; ctx.lineWidth = 2;
  ctx.moveTo(toX(valid[0].min), toY(valid[0].percentil_acum));
  valid.slice(1).forEach(pt => ctx.lineTo(toX(pt.min), toY(pt.percentil_acum)));
  ctx.stroke();

  const last = valid[valid.length-1];
  ctx.beginPath();
  ctx.arc(toX(last.min), toY(last.percentil_acum), 3, 0, Math.PI*2);
  ctx.fillStyle = '#00e5a0'; ctx.fill();
}

// ── Radar Chart ──────────────────────────────────────────────────────────────
// Eixos do radar: 8 dimensões cobrindo ataque, passe, defesa, duelos
const RADAR_AXES = [
  { label: 'Finalização', fn: p => {
      const c = p['Chutes no Alvo'], t = p['Chutes Totais'];
      return (t > 0) ? (c||0)/t : 0;
    }, max: 1 },
  { label: 'Criação',     fn: p => Math.min((p['Passes Chave']||0)/8, 1),    max: 1 },
  { label: 'Passe (%)',   fn: p => Math.min((p['Precisao Passe (%)']||0)/100, 1), max: 1 },
  { label: 'Dribles',     fn: p => Math.min((p['Dribles Certos']||0)/8, 1),  max: 1 },
  { label: 'Recuperação', fn: p => Math.min((p['Recuperacoes de Bola']||0)/15, 1), max: 1 },
  { label: 'Desarmes',    fn: p => Math.min((p['Desarmes Feitos']||0)/10, 1), max: 1 },
  { label: 'Aéreos',      fn: p => {
      const g = p['Duelos Aereos Ganhos']||0, pe = p['Duelos Aereos Perdidos']||0;
      return (g+pe>0) ? g/(g+pe) : 0;
    }, max: 1 },
  { label: 'Disciplina',  fn: p => {
      // inverte: menos faltas/cartões = melhor
      const f = (p['Faltas Cometidas']||0) + (p['Cartoes Amarelos']||0)*2 + (p['Cartoes Vermelhos']||0)*4;
      return Math.max(0, 1 - Math.min(f/12, 1));
    }, max: 1 },
];

function drawRadar(canvasId, pA, pB, colorA, colorB){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx  = canvas.getContext('2d');
  const W    = canvas.width;
  const H    = canvas.height;
  const cx   = W / 2;
  const cy   = H / 2;
  const R    = Math.min(W, H) / 2 - 36;  // raio do radar
  const N    = RADAR_AXES.length;
  const step = (Math.PI * 2) / N;
  const startAngle = -Math.PI / 2;       // começa no topo

  ctx.clearRect(0, 0, W, H);

  // ── Grade de fundo ──────────────────────────────────────────────────────
  const gridLevels = 4;
  for(let lvl = 1; lvl <= gridLevels; lvl++){
    const r = R * (lvl / gridLevels);
    ctx.beginPath();
    for(let i = 0; i < N; i++){
      const ang = startAngle + i * step;
      const x   = cx + r * Math.cos(ang);
      const y   = cy + r * Math.sin(ang);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    ctx.stroke();
    if(lvl === gridLevels){
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fill();
    }
  }

  // ── Eixos ──────────────────────────────────────────────────────────────
  for(let i = 0; i < N; i++){
    const ang = startAngle + i * step;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(ang), cy + R * Math.sin(ang));
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth   = 1;
    ctx.stroke();
  }

  // ── Labels ─────────────────────────────────────────────────────────────
  ctx.fillStyle  = 'rgba(255,255,255,0.55)';
  ctx.font       = 'bold 9px Rajdhani,sans-serif';
  ctx.textAlign  = 'center';
  ctx.textBaseline = 'middle';
  for(let i = 0; i < N; i++){
    const ang  = startAngle + i * step;
    const lx   = cx + (R + 20) * Math.cos(ang);
    const ly   = cy + (R + 20) * Math.sin(ang);
    ctx.fillText(RADAR_AXES[i].label, lx, ly);
  }

  // ── Polígono helper ────────────────────────────────────────────────────
  function drawPoly(player, fillColor, strokeColor){
    const vals = RADAR_AXES.map(ax => Math.max(0, Math.min(1, ax.fn(player) || 0)));
    ctx.beginPath();
    vals.forEach((v, i) => {
      const ang = startAngle + i * step;
      const r   = R * v;
      const x   = cx + r * Math.cos(ang);
      const y   = cy + r * Math.sin(ang);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle   = fillColor;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth   = 1.8;
    ctx.stroke();
    // Pontos nos vértices
    vals.forEach((v, i) => {
      const ang = startAngle + i * step;
      const r   = R * v;
      ctx.beginPath();
      ctx.arc(cx + r*Math.cos(ang), cy + r*Math.sin(ang), 2.5, 0, Math.PI*2);
      ctx.fillStyle = strokeColor;
      ctx.fill();
    });
  }

  // Jogador A sempre existe
  const cA = colorA || '#00e5a0';
  drawPoly(pA, hexToRgba(cA, 0.18), cA);

  // Jogador B opcional (comparação)
  if(pB){
    const cB = colorB || '#ffc400';
    drawPoly(pB, hexToRgba(cB, 0.14), cB);
  }
}

function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Rede de Passes ──────────────────────────────────────────────────────────
let passNetActive  = false;
let passNetBuilt   = null;  // cache do resultado de buildPassNet()

function togglePassNet(){
  passNetActive = !passNetActive;
  const toggle = document.getElementById('pass-net-toggle');
  const svg    = document.getElementById('pass-net-svg');
  toggle.classList.toggle('active', passNetActive);
  if(passNetActive){
    svg.classList.add('visible');
    renderPassNet();
  } else {
    svg.classList.remove('visible');
    svg.innerHTML = '';
    passNetBuilt  = null;
    document.getElementById('pass-tooltip').style.display = 'none';
  }
}

function refreshPassNet(){
  if(passNetActive){
    passNetBuilt = null;   // invalida cache quando formação muda
    renderPassNet();
  }
}

function getPlayerFieldPos(name){
  for(const team of [MATCH_INFO.time_fora, MATCH_INFO.time_casa]){
    const isTop  = (team === MATCH_INFO.time_fora);
    const LINE_Y = isTop ? LINE_Y_FORA : LINE_Y_CASA;
    for(const line of ['GK','DEF','MID','FWD']){
      const players    = (formations[team]||{})[line]||[];
      const xPositions = LINE_X[Math.min(players.length,5)]||LINE_X[4];
      const idx        = players.findIndex(p => p.Jogador === name);
      if(idx !== -1){
        return {xPct: parseFloat(xPositions[idx]), yPct: parseFloat(LINE_Y[line])};
      }
    }
  }
  return null;
}

function pctToVB(xPct, yPct){
  return { x: (xPct/100)*680, y: (yPct/100)*720 };
}

// ── buildPassNet: calcula geometria uma vez, devolve estrutura completa ──────
function buildPassNet(){
  if(!PASSES || PASSES.length === 0) return null;

  // 1. Lookup bidirecional
  const lookup = {};
  PASSES.forEach(({origem, destino, count}) => {
    const key = [origem, destino].sort().join('|');
    if(!lookup[key]) lookup[key] = {a: origem, b: destino, ab:0, ba:0};
    if(lookup[key].a === origem) lookup[key].ab += count;
    else                         lookup[key].ba += count;
  });

  // 2. Filtra pares em campo
  const pairs = Object.values(lookup).filter(pair =>
    getPlayerFieldPos(pair.a) && getPlayerFieldPos(pair.b)
  );
  if(pairs.length === 0) return null;

  const totalMax = Math.max(...pairs.map(p => p.ab + p.ba), 1);

  // 3. Geometria base por par
  const geoMap = {};
  pairs.forEach(pair => {
    const posA = getPlayerFieldPos(pair.a);
    const posB = getPlayerFieldPos(pair.b);
    const vA   = pctToVB(posA.xPct, posA.yPct);
    const vB   = pctToVB(posB.xPct, posB.yPct);
    const dx   = vB.x - vA.x;
    const dy   = vB.y - vA.y;
    const len  = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx   = -dy / len;   // perpendicular normalizado
    const ny   =  dx / len;
    const key  = [pair.a, pair.b].sort().join('|');
    geoMap[key] = {vA, vB, nx, ny, len, dx, dy};
  });

  // 4. Anti-sobreposição: offset perpendicular por cluster
  const ANGLE_THRESH = Math.cos((25 * Math.PI) / 180);
  const DIST_THRESH  = 60;
  const BASE_OFFSET  = 18;

  const keys      = pairs.map(p => [p.a, p.b].sort().join('|'));
  const assigned  = {};
  const processed = new Set();

  keys.forEach(keyA => {
    if(processed.has(keyA)) return;
    const gA   = geoMap[keyA];
    const cxA  = (gA.vA.x + gA.vB.x) / 2;
    const cyA  = (gA.vA.y + gA.vB.y) / 2;
    const cluster = [keyA];
    keys.forEach(keyB => {
      if(keyB === keyA) return;
      const gB  = geoMap[keyB];
      const dot = Math.abs((gA.dx*gB.dx + gA.dy*gB.dy) / (gA.len*gB.len));
      if(dot < ANGLE_THRESH) return;
      const cxB   = (gB.vA.x + gB.vB.x) / 2;
      const cyB   = (gB.vA.y + gB.vB.y) / 2;
      const perpD = Math.abs((cxB - cxA)*gA.nx + (cyB - cyA)*gA.ny);
      if(perpD < DIST_THRESH) cluster.push(keyB);
    });
    const N = cluster.length;
    cluster.forEach((k, i) => {
      const slot  = i - (N - 1) / 2;
      const scale = Math.min(1, geoMap[k].len / 200);
      assigned[k] = slot * BASE_OFFSET * (0.5 + 0.5 * scale);
      processed.add(k);
    });
  });

  // 5. Monta array de edges com toda a info necessária para o render
  const edges = pairs.map(pair => {
    const key    = [pair.a, pair.b].sort().join('|');
    const geo    = geoMap[key];
    const offset = assigned[key] ?? 0;
    const {vA, vB, nx, ny} = geo;

    // Ponto de controle Bézier Q
    const ctrlX = (vA.x + vB.x) / 2 + nx * offset;
    const ctrlY = (vA.y + vB.y) / 2 + ny * offset;

    // Ponto médio real em t=0.5: 0.25·A + 0.5·ctrl + 0.25·B
    const curveMx = 0.25*vA.x + 0.5*ctrlX + 0.25*vB.x;
    const curveMy = 0.25*vA.y + 0.5*ctrlY + 0.25*vB.y;

    const d     = `M ${vA.x.toFixed(1)} ${vA.y.toFixed(1)} Q ${ctrlX.toFixed(1)} ${ctrlY.toFixed(1)} ${vB.x.toFixed(1)} ${vB.y.toFixed(1)}`;
    const total = pair.ab + pair.ba;
    const alpha = 0.10 + (total / totalMax) * 0.80;

    return {pair, key, vA, vB, d, curveMx, curveMy, total, alpha};
  });

  // 6. Índice: jogador → lista de keys de arestas conectadas
  const playerEdges = {};
  edges.forEach(({pair, key}) => {
    [pair.a, pair.b].forEach(name => {
      if(!playerEdges[name]) playerEdges[name] = [];
      playerEdges[name].push(key);
    });
  });

  // 7. Nós (jogadores únicos em campo)
  const seenPlayers = new Set();
  pairs.forEach(pair => { seenPlayers.add(pair.a); seenPlayers.add(pair.b); });
  const nodes = [];
  seenPlayers.forEach(name => {
    const pos = getPlayerFieldPos(name);
    if(!pos) return;
    const vp          = pctToVB(pos.xPct, pos.yPct);
    const totalPasses = PASSES
      .filter(p => p.origem === name || p.destino === name)
      .reduce((s, p) => s + p.count, 0);
    const nodeR = 4 + (totalPasses / totalMax) * 6;
    nodes.push({name, vp, nodeR, totalPasses});
  });

  return {edges, nodes, playerEdges, totalMax};
}

// ── renderPassNet: usa buildPassNet e monta o SVG ───────────────────────────
function renderPassNet(){
  const svg = document.getElementById('pass-net-svg');
  svg.innerHTML = '';

  const data = buildPassNet();
  if(!data) return;
  passNetBuilt = data;

  const {edges, nodes, playerEdges} = data;

  // Estado de interação
  let selectedNode = null;   // nome do jogador selecionado via nó
  let hoveredEdge  = null;   // key da aresta em hover (só quando nó selecionado)
  const tip        = document.getElementById('pass-tooltip');

  // Fecha tudo ao clicar fora
  if(!svg._tipListenerAdded){
    svg._tipListenerAdded = true;
    document.addEventListener('click', e => {
      if(!e.target.closest('#pass-net-svg') && !e.target.closest('#pass-tooltip')){
        clearSelection();
      }
    });
  }

  // ── Camada de arestas ──────────────────────────────────────────────────────
  const edgeLayer = document.createElementNS('http://www.w3.org/2000/svg','g');
  edgeLayer.setAttribute('id', 'pn-edges');
  svg.appendChild(edgeLayer);

  // ── Camada de nós (acima das arestas) ─────────────────────────────────────
  const nodeLayer = document.createElementNS('http://www.w3.org/2000/svg','g');
  nodeLayer.setAttribute('id', 'pn-nodes');
  svg.appendChild(nodeLayer);

  // Mapa key → elemento SVG para update rápido
  const edgeElems = {};   // key → {vis, hit}
  const nodeElems = {};   // name → {circle, ring}

  // ── Desenha arestas ────────────────────────────────────────────────────────
  edges.forEach(({pair, key, d, alpha}) => {
    // Visual
    const vis = document.createElementNS('http://www.w3.org/2000/svg','path');
    vis.setAttribute('d', d);
    vis.setAttribute('fill', 'none');
    vis.setAttribute('stroke', '#e8f4ff');
    vis.setAttribute('stroke-width', '1.5');
    vis.setAttribute('stroke-opacity', alpha.toFixed(3));
    vis.setAttribute('stroke-linecap', 'round');
    vis.style.pointerEvents = 'none';
    vis.style.transition    = 'stroke-opacity 0.15s, stroke 0.1s';

    // Hit — exatamente sobre a visual, stroke-width = 1.5 + tolerância mínima de 4px
    // para garantir que o click caia na linha sem ampliar demais
    const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('d', d);
    hit.setAttribute('fill', 'none');
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '5');   // tolerância justa: ±2.5px da linha
    hit.style.cursor        = 'default';
    hit.style.pointerEvents = 'none';        // desabilitado até nó ser selecionado

    edgeLayer.appendChild(vis);
    edgeLayer.appendChild(hit);
    edgeElems[key] = {vis, hit, pair};
  });

  // ── Desenha nós ───────────────────────────────────────────────────────────
  nodes.forEach(({name, vp, nodeR}) => {
    // Anel externo pulsante (visível após seleção)
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx', vp.x.toFixed(1));
    ring.setAttribute('cy', vp.y.toFixed(1));
    ring.setAttribute('r',  (nodeR + 5).toFixed(1));
    ring.setAttribute('fill',         'none');
    ring.setAttribute('stroke',       '#00e5a0');
    ring.setAttribute('stroke-width', '1.5');
    ring.setAttribute('stroke-opacity', '0');
    ring.style.pointerEvents = 'none';
    ring.style.transition    = 'stroke-opacity 0.15s';

    // Círculo do nó
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', vp.x.toFixed(1));
    circle.setAttribute('cy', vp.y.toFixed(1));
    circle.setAttribute('r',  nodeR.toFixed(1));
    circle.setAttribute('fill',         'rgba(232,244,255,0.15)');
    circle.setAttribute('stroke',       'rgba(232,244,255,0.55)');
    circle.setAttribute('stroke-width', '1.5');
    circle.style.cursor     = 'pointer';
    circle.style.transition = 'fill 0.12s, stroke 0.12s, stroke-opacity 0.12s';

    nodeLayer.appendChild(ring);
    nodeLayer.appendChild(circle);
    nodeElems[name] = {circle, ring, vp, nodeR};

    // ── Clique no nó: seleciona / deseleciona ─────────────────────────────
    circle.addEventListener('click', e => {
      e.stopPropagation();
      if(selectedNode === name){
        clearSelection();
      } else {
        selectNode(name);
      }
    });
  });

  // ── selectNode: destaca arestas do jogador, habilita hover/click nas linhas
  function selectNode(name){
    selectedNode = name;
    hoveredEdge  = null;
    tip.style.display = 'none';

    const myKeys = new Set(playerEdges[name] || []);

    // Nós: destaca o selecionado, escurece os outros
    Object.entries(nodeElems).forEach(([n, el]) => {
      if(n === name){
        el.circle.setAttribute('fill',           'rgba(0,229,160,0.25)');
        el.circle.setAttribute('stroke',         '#00e5a0');
        el.circle.setAttribute('stroke-width',   '2');
        el.ring.setAttribute('stroke-opacity',   '0.7');
      } else {
        el.circle.setAttribute('fill',           'rgba(232,244,255,0.05)');
        el.circle.setAttribute('stroke',         'rgba(232,244,255,0.20)');
        el.circle.setAttribute('stroke-width',   '1.5');
        el.ring.setAttribute('stroke-opacity',   '0');
      }
    });

    // Arestas: destaca as do jogador, apaga as outras; habilita interação
    Object.entries(edgeElems).forEach(([key, {vis, hit, pair}]) => {
      if(myKeys.has(key)){
        vis.setAttribute('stroke',         '#00e5a0');
        vis.setAttribute('stroke-opacity', '0.70');
        vis.setAttribute('stroke-width',   '1.8');
        // Habilita hit área exatamente na linha
        hit.style.pointerEvents = 'stroke';

        // Hover na aresta — só quando selecionada
        hit.onmouseenter = () => {
          if(hoveredEdge === key) return;
          hoveredEdge = key;
          vis.setAttribute('stroke',         '#ffffff');
          vis.setAttribute('stroke-opacity', '1');
          vis.setAttribute('stroke-width',   '2.5');
          hit.style.cursor = 'pointer';
        };
        hit.onmouseleave = () => {
          if(hoveredEdge === key) hoveredEdge = null;
          vis.setAttribute('stroke',         '#00e5a0');
          vis.setAttribute('stroke-opacity', '0.70');
          vis.setAttribute('stroke-width',   '1.8');
          hit.style.cursor = 'default';
        };
        hit.onclick = e => {
          e.stopPropagation();
          showEdgeTip(key);
        };
      } else {
        vis.setAttribute('stroke',         '#e8f4ff');
        vis.setAttribute('stroke-opacity', '0.04');
        vis.setAttribute('stroke-width',   '1.5');
        hit.style.pointerEvents = 'none';
        hit.onmouseenter = null;
        hit.onmouseleave = null;
        hit.onclick      = null;
      }
    });
  }

  function clearSelection(){
    selectedNode = null;
    hoveredEdge  = null;
    tip.style.display = 'none';

    // Restaura visual padrão de todos os nós
    Object.entries(nodeElems).forEach(([, el]) => {
      el.circle.setAttribute('fill',           'rgba(232,244,255,0.15)');
      el.circle.setAttribute('stroke',         'rgba(232,244,255,0.55)');
      el.circle.setAttribute('stroke-width',   '1.5');
      el.ring.setAttribute('stroke-opacity',   '0');
    });

    // Restaura visual padrão de todas as arestas, desabilita interação
    Object.entries(edgeElems).forEach(([key, {vis, hit}]) => {
      const {alpha} = edges.find(e => e.key === key) || {alpha: 0.3};
      vis.setAttribute('stroke',         '#e8f4ff');
      vis.setAttribute('stroke-opacity', alpha.toFixed(3));
      vis.setAttribute('stroke-width',   '1.5');
      hit.style.pointerEvents = 'none';
      hit.onmouseenter = null;
      hit.onmouseleave = null;
      hit.onclick      = null;
      hit.style.cursor = 'default';
    });
  }

  function showEdgeTip(key){
    const edge = edges.find(e => e.key === key);
    if(!edge) return;
    const {pair, curveMx, curveMy, total} = edge;
    const shortN = n => { const pts = n.split(' '); return pts.length > 2 ? pts[0]+' '+pts[pts.length-1] : n; };

    tip.innerHTML = `
      <div class="pt-pair">${shortN(pair.a)} ↔ ${shortN(pair.b)}</div>
      <div class="pt-row">
        <span class="pt-lbl">${shortN(pair.a)} → ${shortN(pair.b)}</span>
        <span class="pt-val">${pair.ab}</span>
      </div>
      <div class="pt-row">
        <span class="pt-lbl">${shortN(pair.b)} → ${shortN(pair.a)}</span>
        <span class="pt-val">${pair.ba}</span>
      </div>
      <div class="pt-row" style="border-top:1px solid rgba(0,229,160,.25);margin-top:4px;padding-top:4px">
        <span class="pt-lbl">Total</span>
        <span class="pt-val">${total} passes</span>
      </div>`;

    // Posição baseada no ponto médio real da Bézier (em coordenadas de tela)
    const rect   = svg.getBoundingClientRect();
    const scaleX = rect.width  / 680;
    const scaleY = rect.height / 720;
    const sx     = rect.left + curveMx * scaleX;
    const sy     = rect.top  + curveMy * scaleY;

    tip.style.display = 'block';
    tip.style.left    = (sx + 14) + 'px';
    tip.style.top     = (sy - 10) + 'px';

    requestAnimationFrame(() => {
      const tr = tip.getBoundingClientRect();
      if(tr.right  > window.innerWidth  - 8) tip.style.left = (sx - tr.width  - 14) + 'px';
      if(tr.bottom > window.innerHeight - 8) tip.style.top  = (sy - tr.height + 10) + 'px';
    });
  }
}

init();



</script>
</body>
</html>
