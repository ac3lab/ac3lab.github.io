  function decodeUtf8Base64(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder("utf-8").decode(bytes);
  }

  function isMobileDevice() {
    const ua = navigator.userAgent || navigator.vendor || window.opera || "";
    const uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
    const coarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    const narrowViewport = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
    return Boolean(uaMobile || (coarsePointer && narrowViewport));
  }
